name: Update Credly Badges

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch:   # Allows you to trigger it manually via the Actions tab

permissions:
  contents: write      # Grants permission to push the updated README back to your repo

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync Credly Badges
        uses: jd-35656/readme-credly-badges@v1
        with:
          credly_username: bhuvesh-rohankar # Replace with your actual Credly username
          badge_size: '110x110'                   # Optional: Customize the display size
